<div @zoomIn
    class="flex flex-col items-center text-center bg-white rounded-2xl border border-gray-200 shadow-lg p-6 sm:p-7 w-full max-w-sm sm:max-w-md mx-auto">

    <!-- Icon -->
    <div class="flex items-center justify-center w-14 h-14 sm:w-16 sm:h-16 rounded-full mb-4"
        [ngClass]="styles.iconBg + ' ' + styles.iconColor">

        <mat-icon class="scale-150">
            {{ data.icon || 'warning' }}
        </mat-icon>

    </div>

    <!-- Title -->
    <h2 class="text-lg sm:text-xl font-semibold text-gray-900">
        {{ data.title }}
    </h2>

    <!-- Message -->
    <p class="text-sm sm:text-[15px] text-gray-600 mt-2 leading-relaxed max-w-xs sm:max-w-sm">
        {{ data.message }}
    </p>

    <!-- Actions -->
    <div class="flex flex-col-reverse sm:flex-row gap-3 w-full mt-6">

        <!-- Cancel -->
        <button type="button" (click)="cancel()"
            class="flex items-center justify-center gap-2 h-11 w-full rounded-lg border border-gray-400 bg-white text-gray-600 text-sm font-medium hover:bg-gray-100 active:scale-95 transition">
            <mat-icon *ngIf="data.cancelIcon" class="text-[18px]">
                {{ data.cancelIcon }}
            </mat-icon>

            {{ data.cancelText || 'Cancel' }}
        </button>

        <!-- Confirm -->
        <button type="button" (click)="confirm()" [ngClass]="styles.confirmBtn"
            class="flex items-center justify-center gap-2 h-11 w-full rounded-lg text-white text-sm font-bold active:scale-95 transition">
            <mat-icon *ngIf="data.confirmIcon" class="text-[18px]">
                {{ data.confirmIcon }}
            </mat-icon>

            {{ data.confirmText || 'Confirm' }}
        </button>

    </div>

</div>
